<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luminiano</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- ── Header ── -->
  <div class="header">
    <div class="eyebrow">● online instrument</div>
    <h1>Lumi<span>ni</span>ano</h1>
  </div>

  <!-- ── Waveform Visualizer ── -->
  <div class="visualizer-wrap">
    <canvas id="visualizer"></canvas>
  </div>

  <!-- ── Controls ── -->
  <div class="controls">

    <!-- Root Key -->
    <div class="control-group">
      <div class="control-label">Root Key</div>
      <select id="rootKey">
        <option value="C">C</option>
        <option value="C#">C♯ / D♭</option>
        <option value="D">D</option>
        <option value="D#">D♯ / E♭</option>
        <option value="E">E</option>
        <option value="F">F</option>
        <option value="F#">F♯ / G♭</option>
        <option value="G">G</option>
        <option value="G#">G♯ / A♭</option>
        <option value="A">A</option>
        <option value="A#">A♯ / B♭</option>
        <option value="B">B</option>
      </select>
    </div>

    <!-- Scale -->
    <div class="control-group">
      <div class="control-label">Scale</div>
      <select id="scale">
        <option value="chromatic">Chromatic</option>
        <option value="major" selected>Major</option>
        <option value="minor">Natural Minor</option>
        <option value="harmonic">Harmonic Minor</option>
        <option value="pentatonic">Pentatonic Major</option>
        <option value="pentatonicMinor">Pentatonic Minor</option>
        <option value="blues">Blues</option>
        <option value="dorian">Dorian</option>
        <option value="phrygian">Phrygian</option>
        <option value="lydian">Lydian</option>
        <option value="mixolydian">Mixolydian</option>
        <option value="locrian">Locrian</option>
        <option value="wholeTone">Whole Tone</option>
        <option value="diminished">Diminished</option>
      </select>
    </div>

    <!-- Octave -->
    <div class="control-group">
      <div class="control-label">Octave</div>
      <div class="octave-control">
        <button class="oct-btn" id="octDown">−</button>
        <div class="oct-display" id="octDisplay">4</div>
        <button class="oct-btn" id="octUp">+</button>
      </div>
    </div>

    <!-- Sustain -->
    <div class="control-group">
      <div class="control-label">Sustain</div>
      <div class="sustain-toggle" id="sustainToggle">
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
        <span class="toggle-label">Off</span>
      </div>
      <div class="sustain-slider-wrap">
        <input type="range" id="sustainAmount" min="0.1" max="4" step="0.1" value="1.5">
        <div class="slider-labels"><span>Short</span><span>Long</span></div>
      </div>
    </div>

    <!-- Active Notes -->
    <div class="control-group" style="grid-column: 1 / -1">
      <div class="control-label">Playing</div>
      <div class="active-notes" id="activeNotes">
        <span style="font-size:11px;color:var(--text-dim);letter-spacing:1px;">— touch a key —</span>
      </div>
    </div>

  </div>

  <!-- ── Piano ── -->
  <div class="piano-wrap">
    <div class="keys-container" id="pianoKeys"></div>
    <div class="kb-hint-bar" id="kbHintBar"></div>
  </div>

  <div class="footer">luminiano ·  ← → to shift octave</div>
  <a href="https://aab-i-xes.github.io/AA-B-I-XES/" target="_blank" class="social-link">AAB-I-X-ES</a>

</div>

<script src="piano.js"></script>
</body>
</html>
